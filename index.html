<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EYE SIREN</title>
<script src="lib/face-api.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:Arial,sans-serif;overflow:hidden;height:100vh}
video{width:100%;height:100%;object-fit:cover;position:fixed;inset:0}
canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none}
#overlay{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);text-align:center;z-index:10;display:flex;flex-direction:column;align-items:center;gap:12px}
#status{font-size:1.4rem;font-weight:bold;padding:10px 24px;border-radius:8px;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);transition:all 0.3s;min-width:200px}
#status.open{color:#00ff88;border:2px solid #00ff88}
#status.closed{color:#ff0044;border:2px solid #ff0044;animation:pulse 0.5s infinite}
#status.noface{color:#ffaa00;border:2px solid #ffaa00}
#ear{font-size:2rem;font-weight:bold;color:#888}
#ear span{color:#00ff88}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
#startBtn{padding:16px 48px;font-size:1.2rem;border:2px solid #00ff88;border-radius:8px;background:rgba(0,0,0,0.8);color:#00ff88;cursor:pointer;transition:all 0.3s;font-weight:bold;backdrop-filter:blur(8px)}
#startBtn:hover{background:#00ff88;color:#000}
#startBtn.active{background:#ff0044;border-color:#ff0044;color:#fff}
.btn-group{display:flex;gap:10px}
#soundBtn{padding:10px 20px;font-size:0.9rem;border:1px solid #555;border-radius:6px;background:rgba(0,0,0,0.7);color:#ccc;cursor:pointer}
#soundBtn:hover{border-color:#fff}
</style>
</head>
<body>
<video id="video" autoplay muted playsinline></video>
<canvas id="overlay"></canvas>
<div id="overlay">
  <div id="ear">EAR: <span id="earVal">0.00</span></div>
  <div id="status" class="noface">NO FACE</div>
  <button id="startBtn" onclick="start()">START</button>
  <button id="soundBtn" onclick="toggleSound()">Sound: ON</button>
</div>

<script>
const video=document.getElementById('video'),canvas=document.getElementById('overlay'),ctx=canvas.getContext('2d');
let running=false,soundEnabled=true,modelReady=false;
let closedFrames=0,sirenOn=false,lastEar=0;
const EAR_TH=0.22,EAR_CONSEC=2;let sirenAudio=null;

function ear(eye){
  const d1=Math.hypot(eye[1].x-eye[5].x,eye[1].y-eye[5].y);
  const d2=Math.hypot(eye[2].x-eye[4].x,eye[2].y-eye[4].y);
  const d3=Math.hypot(eye[0].x-eye[3].x,eye[0].y-eye[3].y);
  return (d1+d2)/(2*d3);
}

async function start(){
  if(running){running=false;document.getElementById('startBtn').textContent='START';document.getElementById('startBtn').classList.remove('active');return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:false});
    video.srcObject=stream;
    await new Promise((res,rej)=>{video.onloadedmetadata=()=>{video.play().then(res).catch(rej);};setTimeout(()=>rej(new Error('timeout')),10000);});
    canvas.width=video.videoWidth||640;canvas.height=video.videoHeight||480;
    running=true;
    document.getElementById('startBtn').textContent='STOP';
    document.getElementById('startBtn').classList.add('active');
    document.getElementById('status').textContent='LOADING MODEL...';
    document.getElementById('status').className='noface';
    try{
      await faceapi.loadTinyFaceDetectorModel('weights');
      await faceapi.loadFaceLandmarkTinyModel('weights');
      modelReady=true;
      document.getElementById('status').textContent='FACE READY';
      setTimeout(loop,500);
    }catch(e){
      document.getElementById('status').textContent='MODEL ERROR: '+e.message;
    }
  }catch(e){
    document.getElementById('status').textContent='CAMERA ERROR';
    document.getElementById('startBtn').textContent='RETRY';
  }
}

async function loop(){
  if(!running)return;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(modelReady){
    try{
      const det=await faceapi.detectSingleFace(video,new faceapi.TinyFaceDetectorOptions({inputSize:320})).withFaceLandmarks();
      if(det){
        const lm=det.landmarks;
        let l=[],r=[];
        lm.getLeftEye().forEach(p=>l.push({x:p.x,y:p.y}));
        lm.getRightEye().forEach(p=>r.push({x:p.x,y:p.y}));
        const e=(ear(l)+ear(r))/2;
        lastEar=e;
        document.getElementById('earVal').textContent=e.toFixed(2);

        const pts=lm.getPositions();
        ctx.fillStyle='#00ff88';
        pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fill();});

        if(e<EAR_TH){
          closedFrames++;
          if(closedFrames>=EAR_CONSEC){
            document.getElementById('status').textContent='EYES CLOSED!';
            document.getElementById('status').className='closed';
            if(soundEnabled&&!sirenOn){
              sirenOn=true;
              playSiren();
            }
          }
        }else{
          closedFrames=0;
          document.getElementById('status').textContent='EYES OPEN';
          document.getElementById('status').className='open';
          if(sirenOn){sirenOn=false;stopSiren();}
        }
      }else{
        document.getElementById('status').textContent='NO FACE';
        document.getElementById('status').className='noface';
        if(sirenOn){sirenOn=false;stopSiren();}
      }
    }catch(e){console.error(e)}
  }

  setTimeout(loop,500);
}

function playSiren(){
  if(!sirenAudio){
    sirenAudio=new Audio('arpit_bala_alarm.mp3');
    sirenAudio.loop=true;
  }
  sirenAudio.currentTime=0;
  sirenAudio.play().catch(()=>{});
}
function stopSiren(){
  if(sirenAudio){sirenAudio.pause();sirenAudio.currentTime=0;}
}

function toggleSound(){
  soundEnabled=!soundEnabled;
  document.getElementById('soundBtn').textContent='Sound: '+(soundEnabled?'ON':'OFF');
  if(!soundEnabled&&sirenOn){sirenOn=false;stopSiren();}
}
</script>
</body>
</html>
